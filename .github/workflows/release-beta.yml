name: release-beta

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows_signer_hello:
    name: Windows signer hello world
    runs-on:
      - self-hosted
      - Windows
      - windows-signer
    steps:
      - name: Hello from signer runner
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          "signer runner hello"
          "runner_name=$env:RUNNER_NAME"
          "runner_os=$env:RUNNER_OS"
          "computername=$env:COMPUTERNAME"
          "user=$(whoami)"
          "pwd=$(Get-Location)"

      - name: Check signing tool visibility
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $signtool = Get-Command signtool.exe -ErrorAction SilentlyContinue
          if ($null -eq $signtool) {
            "signtool.exe not found on PATH"
            exit 0
          }
          "signtool=$($signtool.Source)"
